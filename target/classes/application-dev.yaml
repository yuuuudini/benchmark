server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: git-python-orchestrator
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:mysql://localhost:3306/benchmark
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver # <-- FIXED: Correct driver package name
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect # <-- FIXED: Explicit modern dialect mapping
    hibernate:
      ddl-auto: create-drop 
    show-sql: false
    properties:
      hibernate.jdbc.batch_size: 25
      hibernate.order_inserts: true
      hibernate.order_updates: true

orchestrator:
  scheduler:
    cron-expression: "0 */15 * * * *" # Every 15 minutes
    enabled: true
  concurrency:
    max-pool-size: 4
    queue-capacity: 100
  execution:
    timeout-minutes: 30
    python-executable: python3
  git:
    ssh-private-key-path: /Users/michelleapel/.ssh/id_ed25519
    repositories:
      dataset:
        url: git@github.com:yuuuudini/datasets.git
        branch: main
        local-path: repos/datasets
      scripts:
        url: git@github.com:yuuuudini/algorithms.git
        branch: main
        local-path: repos/algorithms